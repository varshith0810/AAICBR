services:
  - type: web
    name: cattle-breed-recognition
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.web_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_BUNDLE
        value: cattle_model_low_hw.tar.gz
      - key: DEBUG_BUNDLE
        value: "false"
